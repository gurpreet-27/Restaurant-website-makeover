<!DOCTYPE html>
<html>
<head>
    <title>Delicious Eats Restaurant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
<header class="header">
    <h1>Welcome to Delicious Eats</h1>
    <img 
        src="images/logo.jpg"
        srcset="images/logo.jpg 1x"
        sizes="(max-width: 768px) 100vw, 200px"
        alt="Restaurant Logo">
</header>

<nav class="nav">
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="#">Contact</a>
</nav>

<main class="grid-layout">

    <section class="card">
        <h2>About Us</h2>
        <p>Delicious Eats Diner serves classic American comfort food with a modern twist.</p>

        <img 
            src="images/dining_room.jpg"
            srcset="images/dining_room.jpg 400w, images/dining_room.jpg 800w"
            sizes="(max-width: 768px) 100vw, 50vw"
            alt="Dining Room">
    </section>

    <section class="card">
        <h2>Our Hours</h2>
        <p>Monday - Friday: 9am - 9pm</p>

        <img 
            src="images/chef.png"
            srcset="images/chef.png 400w, images/chef.png 800w"
            sizes="(max-width: 768px) 100vw, 50vw"
            alt="Chef">
    </section>

</main>

<footer class="footer">
    <p>&copy; 2023 Delicious Eats</p>
</footer>
</div>
</body>
</html>
